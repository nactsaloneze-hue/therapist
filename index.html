<style>
/* =====================
   BASE
===================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Hiragino Kaku Gothic ProN’, ‘Noto Sans JP’, sans-serif;
background: #0a0d1a;
min-height: 100vh;
color: #eee;
}

/* =====================
HERO（フルウィズ・コンテナ外）
===================== */
.hero-wrap {
position: relative;
width: 100%;
min-height: 280px;
overflow: hidden;
background: linear-gradient(160deg, #141830 0%, #0a0d1a 100%);
}

/* 背景写真 */
.hero-bg {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
object-position: center top;
z-index: 0;
}

/* 透過PNGイラスト（文字の背後） */
.hero-illust {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
object-position: center center;
z-index: 2;
pointer-events: none;
}

/* 暗幕グラデーション */
.hero-overlay {
position: absolute;
inset: 0;
background: linear-gradient(
to bottom,
rgba(10,13,26,0.20) 0%,
rgba(10,13,26,0.40) 55%,
rgba(10,13,26,0.85) 100%
);
z-index: 1;
}

/* テキスト（最前面） */
.hero-text {
position: relative;
z-index: 3;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 280px;
padding: 40px 20px 36px;
text-align: center;
}

.hero-label {
font-size: 10px;
font-weight: bold;
letter-spacing: 4px;
color: #c0a0e0;
text-transform: uppercase;
margin-bottom: 12px;
}

.hero-h1 {
font-size: 22px;
font-weight: bold;
line-height: 1.65;
color: #ede0ff;
-webkit-text-fill-color: #ede0ff;
text-shadow: 0 2px 20px rgba(80,30,120,0.7);
margin-bottom: 10px;
}

.hero-h1 span {
background: linear-gradient(90deg, #e0427a, #a078e8);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.hero-sub {
font-size: 12px;
color: #9090b8;
line-height: 1.8;
}

/* =====================
CONTAINER（設問エリア）
===================== */
.container {
max-width: 640px;
margin: 0 auto;
padding: 24px 16px 56px;
}

/* =====================
PROGRESS
===================== */
.progress-wrap { margin-bottom: 22px; }

.progress-label {
display: flex;
justify-content: space-between;
font-size: 11px;
color: #555;
letter-spacing: 1px;
margin-bottom: 7px;
}

.progress-bar {
height: 4px;
background: #1e1e2e;
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, #e0427a, #7b5cf0);
border-radius: 99px;
transition: width 0.4s ease;
}

/* =====================
QUESTION CARD
===================== */
.card {
background: #18181f;
border: 1px solid #2a2a35;
border-radius: 20px;
padding: 26px 20px;
margin-bottom: 16px;
}

.q-number {
font-size: 10px;
font-weight: bold;
color: #e0427a;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 10px;
}

.q-text {
font-size: 16px;
font-weight: bold;
line-height: 1.65;
color: #f0f0f0;
margin-bottom: 20px;
}

.options { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
background: #111116;
border: 1.5px solid #2a2a38;
border-radius: 12px;
padding: 13px 16px;
text-align: left;
font-size: 14px;
color: #bbb;
cursor: pointer;
line-height: 1.55;
transition: border-color 0.2s, background 0.2s, color 0.2s;
-webkit-tap-highlight-color: transparent;
}

.option-btn:hover  { border-color: #7b5cf0; color: #ddd; background: #1a1a24; }
.option-btn.selected {
border-color: #e0427a;
background: linear-gradient(135deg, #1f0f18, #16102a);
color: #f0c0d0;
font-weight: bold;
}

/* =====================
NAV BUTTONS
===================== */
.nav { display: flex; gap: 12px; }

.btn-back {
background: none;
border: 1.5px solid #2a2a38;
border-radius: 12px;
padding: 12px 18px;
font-size: 14px;
color: #555;
cursor: pointer;
transition: border-color 0.2s, color 0.2s;
}
.btn-back:hover { border-color: #555; color: #888; }

.btn-next {
flex: 1;
background: linear-gradient(90deg, #e0427a, #7b5cf0);
border: none;
border-radius: 12px;
padding: 14px 20px;
font-size: 15px;
font-weight: bold;
color: white;
cursor: pointer;
opacity: 0.3;
letter-spacing: 0.5px;
transition: opacity 0.2s;
}
.btn-next.active { opacity: 1; }

/* =====================
RESULT
===================== */
.result-card {
background: #18181f;
border: 1px solid #2a2a35;
border-radius: 20px;
overflow: hidden;
margin-bottom: 16px;

.result-img-wrap {

background: linear-gradient(135deg, #1a0f20, #0f1428);

.result-img-wrap img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;

.result-img-placeholder {
width: 100%;

display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 8px;
color: #444;
font-size: 13px;
}
.result-img-placeholder .emoji { font-size: 48px; }

.result-img-overlay {
position: absolute;
bottom: 0; left: 0; right: 0;
height: 55%;

.result-type-label {
display: inline-block;
background: linear-gradient(90deg, #e0427a, #7b5cf0);

font-size: 10px;
font-weight: bold;

border-radius: 20px;
margin-bottom: 12px;

.result-name {
font-size: 24px;
font-weight: bold;
color: #f0f0f0;
line-height: 1.3;
margin-bottom: 6px;
}

.result-tagline {
font-size: 13px;
color: #666;
letter-spacing: 0.5px;
margin-bottom: 20px;
}

.result-desc {
font-size: 14px;
line-height: 1.85;
color: #999;
background: #111116;
border: 1px solid #222;
border-radius: 12px;
padding: 16px;
margin-bottom: 18px;

.result-section-title {
font-size: 10px;
font-weight: bold;
color: #7b5cf0;
letter-spacing: 2px;
text-transform: uppercase;

.result-ai {

/* =====================
LINE CTA
===================== */
.cta-block {
background: #111116;

padding: 20px;
margin-bottom: 14px;

.cta-pre {
font-size: 11px;
color: #7b5cf0;
font-weight: bold;
letter-spacing: 2px;
text-align: center;
margin-bottom: 6px;
text-transform: uppercase;
}

.cta-headline {

font-weight: bold;
color: #f0f0f0;
text-align: center;

background: linear-gradient(90deg, #e0427a, #f4a94f);

.line-cta {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
background: #06C755;

padding: 16px 20px;
width: 100%;
color: white;
font-size: 15px;
font-weight: bold;

.line-cta:hover  { filter: brightness(1.1); transform: translateY(-1px); }
.line-cta:active { transform: scale(0.98); }

.line-icon {
width: 24px; height: 24px;
background: white;
border-radius: 5px;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.line-icon svg { width: 17px; height: 17px; }

.cta-note {
font-size: 11px;
color: #444;
text-align: center;
margin-top: 10px;
line-height: 1.6;

.btn-retry {
width: 100%;
background: none;
border: 1.5px solid #2a2a38;
border-radius: 12px;
padding: 13px;
font-size: 14px;
color: #555;
cursor: pointer;
transition: border-color 0.2s, color 0.2s;
}
.btn-retry:hover { border-color: #555; color: #888; }
</style>

const types = {
  A: {
    emoji: "🔨", img: "result_a.png",
    name: "技術職人タイプ", tagline: "腕が全て。誠実に技を磨く職人気質",

    ai: "AIは「あなたを守るバッファ」として使いましょう。値上げ告知文・ご要望をお断りする文・LINE返信テンプレートなど、「直接言いづらいこと」をAIに文章化させると感情消耗が激減します。カウンセリングシートや顧客管理の整理にも活用できます。",
  },
  C: {

    ai: "AIは「世界観を壊さずに収益化する橋渡し役」として使いましょう。あなたの言葉・想いをインプットして、販売ページ・メニュー説明・価格設定の根拠をAIに整理させる。発信→集客→収益の導線をAIで設計することで、世界観を守りながら売上を立てられます。",
  },

/* =====================
   STATE
===================== */
let current = 0, answers = [], selected = null;

function scores() {
  const s = { A:0, B:0, C:0, D:0 };
  answers.forEach(a => s[a.t]++);
  return s;
}
function topType() {
  return Object.entries(scores()).sort((a,b) => b[1]-a[1])[0][0];
}

/* =====================
   RENDER QUESTION
===================== */
function render() {
  const q = questions[current];
  document.getElementById('q-num').textContent  = `Q${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('prog-text').textContent = `QUESTION ${current+1} / ${questions.length}`;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  selected = answers[current] ? answers[current].t : null;

  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (selected === o.t ? ' selected' : '');
    btn.textContent = o.text;
    btn.onclick = () => pick(o.t, i);
    opts.appendChild(btn);
  });

  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
  syncNext();
}

function pick(t, idx) {
  selected = t;
  answers[current] = { t };
  document.querySelectorAll('.option-btn').forEach((b,i) => b.classList.toggle('selected', i === idx));
  syncNext();
}

function syncNext() {
  const btn = document.getElementById('btn-next');
  btn.classList.toggle('active', !!selected);
  btn.textContent = current === questions.length - 1 ? '結果を見る ✦' : '次へ →';
}

function goNext() {
  if (!selected) return;
  if (current < questions.length - 1) { current++; selected = null; render(); }
  else showResult();
}

function goBack() {
  if (current > 0) { current--; selected = answers[current]?.t ?? null; render(); }
}

/* =====================
   RENDER RESULT
===================== */
function showResult() {
  const t = types[topType()];
  document.getElementById('quiz-section').style.display = 'none';
